  <body>
    <h1>Mum's Cottage Pie</h1>
    <p>Long rambling intro about the 1970s...</p>
    <div class="recipe-ingredients">
      <ul>
        <li>500g minced beef</li>
        <li>1 onion</li>
        <li>2 carrots</li>
        <li>800g potatoes</li>
      </ul>
    </div>
    <h2>Instructions</h2>
    <ol>
      <li>Brown the mince with the onion and carrots.</li>
      <li>Boil and mash the potatoes.</li>
      <li>Top the mince with mash and bake until golden.</li>
    </ol>
  </body>
